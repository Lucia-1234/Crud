<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Document</title>
</head>
<body>
  <!--Formulario de las Tareas-->
    <section class="form-section">
        <div class="card">
            <h2 class="card__title">Tareas</h2>
            <form id="formTareas" class="form" novalidate>
            <div class="form__group">
                <label for="tarea" class="form__label">Ingrese la tarea: </label>
                <input 
                type="text" 
                id="tarea" 
                class="form__input" 
                placeholder="Ingrese la tarea a realizar"
                required
                >
            </div>
            <button type="submit" class="btn btn--primary">Agregar Tarea</button>
            </form>
            <div id="resultadoUsuario" class="form__error"></div>
        </div>
        </section>

        <section class="messages-section">
            <div class="messages-header">
                <h2 class="messages-header__title">Tareas Publicadas</h2>
            </div>
            
            <div id="messagesContainer" class="messages-container">
                <!-- Las tareas se agregarán aquí dinámicamente -->
                <div class="messages-empty" id="emptyState">
                    <p class="messages-empty__text">Aún no hay tareas</p>
                    <p class="messages-empty__subtext">Completa el formulario para agregar tu primera tarea</p>
                </div>
            </div>
        </section> 
</body>
</html>
